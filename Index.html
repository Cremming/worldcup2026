<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>World Cup 2026 — The Comp</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#080810;color:#f0f0f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  h1{font-size:28px;font-weight:900;background:linear-gradient(90deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .mono{font-family:'Courier New',monospace}
  select,input{outline:none;font-family:inherit}
  .sel{width:100%;background:#0d0d1c;border:1px solid #2a2a4a;color:#f0f0f0;border-radius:8px;padding:10px 14px;font-size:14px;cursor:pointer}
  .sel:focus{border-color:#8b5cf6}
  .btn{border:none;cursor:pointer;border-radius:8px;font-weight:700;font-size:13px;padding:11px 20px;transition:all .15s;font-family:inherit}
  .numbox{width:68px;background:#0d0d1c;border:1px solid #2a2a4a;color:#f0f0f0;border-radius:6px;padding:6px 8px;font-family:'Courier New',monospace;font-size:13px;text-align:center}
  .numbox:focus{border-color:#8b5cf6}
  .tab{background:none;border:none;cursor:pointer;font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:10px 14px 12px;color:#444;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit;white-space:nowrap}
  .tab.on{color:#f0f0f0;border-bottom-color:#f59e0b}
  .tab:hover:not(.on){color:#888}
  .card{background:#0d0d1c;border-radius:12px;overflow:hidden;margin-bottom:16px}
  .stagepill{border:none;cursor:pointer;border-radius:20px;font-size:11px;font-weight:700;padding:5px 12px;transition:all .15s;font-family:inherit}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .label{font-size:10px;color:#555;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;font-family:'Courier New',monospace}
  #loading{display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#888}
  #app{display:none}
  .chosen-box{margin-top:10px;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px}
  .row-sep{border-bottom:1px solid #1a1a2a}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .fadein{animation:fadeUp .25s ease both}
</style>
</head>
<body>
<div id="loading">Loading…</div>
<div id="app">

<!-- HEADER -->
<div style="background:linear-gradient(180deg,#0f0f20,#080810);border-bottom:1px solid #1a1a30;padding-top:24px">
  <div style="max-width:720px;margin:0 auto;padding:0 16px">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:6px">
      <div>
        <div class="mono" style="font-size:10px;color:#444;letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px">FIFA World Cup 2026</div>
        <h1>The Comp</h1>
      </div>
      <div style="text-align:right;font-family:'Courier New',monospace;font-size:11px;color:#555;line-height:1.9">
        <div>🥇 <span style="color:#f59e0b">$80</span></div>
        <div>🥈 <span style="color:#6ee7b7">$40</span></div>
        <div id="saving-indicator" style="color:#8b5cf6;font-size:10px;visibility:hidden">saving…</div>
      </div>
    </div>
    <!-- player tabs -->
    <div style="display:flex;gap:0;overflow-x:auto;padding-bottom:0;margin-top:16px" id="player-tabs"></div>
  </div>
</div>

<!-- NAV -->
<div style="background:#0a0a18;border-bottom:1px solid #1a1a30">
  <div style="max-width:720px;margin:0 auto;padding:0 16px;display:flex;gap:0;overflow-x:auto">
    <button class="tab on" onclick="showTab('picks')" id="tab-picks">🎯 Picks</button>
    <button class="tab" onclick="showTab('leaderboard')" id="tab-leaderboard">🏆 Leaderboard</button>
    <button class="tab" onclick="showTab('results')" id="tab-results">⚽ Results</button>
    <button class="tab" onclick="showTab('rules')" id="tab-rules">📋 Rules</button>
  </div>
</div>

<!-- CONTENT -->
<div style="max-width:720px;margin:0 auto;padding:24px 16px" id="content"></div>

</div><!-- end #app -->

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const TEAMS = [
  {name:"Spain",odds:4.5},{name:"France",odds:5},{name:"England",odds:5.5},
  {name:"Brazil",odds:8},{name:"Argentina",odds:8.5},{name:"Portugal",odds:10},
  {name:"Germany",odds:12},{name:"Netherlands",odds:18},{name:"Belgium",odds:20},
  {name:"Norway",odds:22},{name:"Colombia",odds:45},{name:"Morocco",odds:45},
  {name:"Japan",odds:60},{name:"USA",odds:60},{name:"Mexico",odds:75},
  {name:"Switzerland",odds:75},{name:"Uruguay",odds:75},{name:"Croatia",odds:90},
  {name:"Ecuador",odds:90},{name:"Senegal",odds:90},{name:"Sweden",odds:90},
  {name:"Turkiye",odds:90},{name:"Austria",odds:125},{name:"Canada",odds:225},
  {name:"Czechia",odds:275},{name:"Egypt",odds:275},{name:"Ivory Coast",odds:275},
  {name:"Paraguay",odds:275},{name:"Algeria",odds:375},{name:"Ghana",odds:375},
  {name:"Bosnia & Herzegovina",odds:400},{name:"Iran",odds:475},{name:"South Korea",odds:475},
  {name:"Tunisia",odds:475},{name:"Cape Verde",odds:500},{name:"Curacao",odds:500},
  {name:"DR Congo",odds:500},{name:"Haiti",odds:500},{name:"Iraq",odds:500},
  {name:"Jordan",odds:500},{name:"New Zealand",odds:500},{name:"Panama",odds:500},
  {name:"Qatar",odds:500},{name:"Saudi Arabia",odds:500},{name:"Scotland",odds:500},
  {name:"South Africa",odds:500},{name:"Uzbekistan",odds:500},{name:"Australia",odds:500}
].sort((a,b)=>a.odds-b.odds||a.name.localeCompare(b.name));

const FLAGS = {
  "Spain":"🇪🇸","France":"🇫🇷","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Brazil":"🇧🇷","Argentina":"🇦🇷","Portugal":"🇵🇹",
  "Germany":"🇩🇪","Netherlands":"🇳🇱","Belgium":"🇧🇪","Norway":"🇳🇴","Colombia":"🇨🇴","Morocco":"🇲🇦",
  "Japan":"🇯🇵","USA":"🇺🇸","Mexico":"🇲🇽","Switzerland":"🇨🇭","Uruguay":"🇺🇾","Croatia":"🇭🇷",
  "Ecuador":"🇪🇨","Senegal":"🇸🇳","Sweden":"🇸🇪","Turkiye":"🇹🇷","Austria":"🇦🇹","Canada":"🇨🇦",
  "Czechia":"🇨🇿","Egypt":"🇪🇬","Ivory Coast":"🇨🇮","Paraguay":"🇵🇾","Algeria":"🇩🇿","Ghana":"🇬🇭",
  "Bosnia & Herzegovina":"🇧🇦","Iran":"🇮🇷","South Korea":"🇰🇷","Tunisia":"🇹🇳","Cape Verde":"🇨🇻",
  "Curacao":"🇨🇼","DR Congo":"🇨🇩","Haiti":"🇭🇹","Iraq":"🇮🇶","Jordan":"🇯🇴","New Zealand":"🇳🇿",
  "Panama":"🇵🇦","Qatar":"🇶🇦","Saudi Arabia":"🇸🇦","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","South Africa":"🇿🇦",
  "Uzbekistan":"🇺🇿","Australia":"🇦🇺"
};

const PLAYERS = ["Gavin","Adam","Mitch","Steve","Alex","Eris"];
const STAGES = ["Eliminated (Group)","Round of 32","Round of 16","Quarter-Final","Semi-Final","Runner-Up","Champion"];
const STAGE_BONUS = [0,2,4,7,12,18,25];

const SLOT_META = {
  think:{label:"Think Will Win",emoji:"🧠",color:"#3b82f6",desc:"Your head pick. Any team. Flat 2pts per win + 0.25pts/goal."},
  want: {label:"Want to Win",   emoji:"❤️", color:"#f59e0b",desc:"Your heart pick. Any team. Points scale with their odds."},
  dark: {label:"Dark Horse",    emoji:"🐴",color:"#8b5cf6",desc:"Must be 50/1 or longer. 5pts/win, 1pt/goal — doubles if they reach knockouts."},
  hail: {label:"Hail Mary",     emoji:"🙏",color:"#ef4444",desc:"Must be 200/1 or longer. 6pts/win × 3 multiplier always."}
};

// ── STATE ─────────────────────────────────────────────────────────────────
let allPicks = {};
let results = {};
let currentPlayer = PLAYERS[0];
let currentTab = "picks";
let db;

// ── POINTS ────────────────────────────────────────────────────────────────
function getWantRule(odds){
  if(odds<=19)  return{win:2,goal:0.25};
  if(odds<=75)  return{win:3,goal:0.5};
  return              {win:4,goal:0.75};
}
function calcTeamPts(slot,teamName){
  const team=TEAMS.find(t=>t.name===teamName);
  const r=results[teamName];
  if(!team||!r) return 0;
  const si=r.stage||0;
  let rule;
  if(slot==="think") rule={win:2,goal:0.25};
  else if(slot==="want") rule=getWantRule(team.odds);
  else if(slot==="dark") rule={win:5,goal:1};
  else rule={win:6,goal:1.5};
  const wins=(r.groupWins||0)+(r.koWins||0);
  const goals=(r.groupGoals||0)+(r.koGoals||0);
  let pts=wins*rule.win+goals*rule.goal+(STAGE_BONUS[si]||0);
  if(slot==="dark"&&si>=1) pts*=2;
  if(slot==="hail") pts*=3;
  return Math.round(pts*10)/10;
}
function calcTotal(picks){
  let t=0;
  for(const s of["think","want","dark","hail"]) if(picks[s]) t+=calcTeamPts(s,picks[s]);
  return Math.round(t*10)/10;
}

// ── FIREBASE ──────────────────────────────────────────────────────────────
function initFirebase(){
  const cfg={
    apiKey:"AIzaSyPlaceholderKeyReplaceMe",
    authDomain:"worldcup2026-comp.firebaseapp.com",
    databaseURL:"https://worldcup2026-comp-default-rtdb.firebaseio.com",
    projectId:"worldcup2026-comp"
  };
  // If no real firebase config, use localStorage fallback
  try{
    firebase.initializeApp(cfg);
    db=firebase.database();
    db.ref("picks").on("value",snap=>{allPicks=snap.val()||{};render();});
    db.ref("results").on("value",snap=>{results=snap.val()||{};render();});
  } catch(e){
    loadLocal();
  }
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="block";
  render();
}

function loadLocal(){
  try{allPicks=JSON.parse(localStorage.getItem("wc_picks")||"{}");}catch(e){}
  try{results=JSON.parse(localStorage.getItem("wc_results")||"{}");}catch(e){}
}
function savePicksLocal(){localStorage.setItem("wc_picks",JSON.stringify(allPicks));}
function saveResultsLocal(){localStorage.setItem("wc_results",JSON.stringify(results));}

function setPick(slot,team){
  if(!allPicks[currentPlayer]) allPicks[currentPlayer]={};
  allPicks[currentPlayer][slot]=team;
  showSaving();
  if(db){
    db.ref("picks/"+currentPlayer).set(allPicks[currentPlayer]).then(hideSaving);
  } else {
    savePicksLocal(); hideSaving();
  }
  renderContent();
}

function saveResult(teamName,data){
  results[teamName]=data;
  showSaving();
  if(db){
    db.ref("results/"+teamName).set(data).then(hideSaving);
  } else {
    saveResultsLocal(); hideSaving();
  }
  renderContent();
}

function showSaving(){document.getElementById("saving-indicator").style.visibility="visible";}
function hideSaving(){document.getElementById("saving-indicator").style.visibility="hidden";}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  renderPlayerTabs();
  renderContent();
}

function renderPlayerTabs(){
  const el=document.getElementById("player-tabs");
  el.innerHTML=PLAYERS.map(p=>`
    <button class="tab ${currentTab==="picks"&&p===currentPlayer?"on":""}"
      onclick="selectPlayer('${p}')" style="padding-bottom:12px">${p}</button>
  `).join("");
}

function selectPlayer(p){
  currentPlayer=p;
  currentTab="picks";
  renderPlayerTabs();
  updateTabHighlights();
  renderContent();
}

function showTab(t){
  currentTab=t;
  updateTabHighlights();
  renderPlayerTabs();
  renderContent();
}

function updateTabHighlights(){
  ["picks","leaderboard","results","rules"].forEach(t=>{
    document.getElementById("tab-"+t).className="tab"+(currentTab===t?" on":"");
  });
}

function renderContent(){
  const el=document.getElementById("content");
  el.className="fadein";
  el.innerHTML="";
  if(currentTab==="picks") el.innerHTML=renderPicks();
  else if(currentTab==="leaderboard") el.innerHTML=renderLeaderboard();
  else if(currentTab==="results") el.innerHTML=renderResults();
  else el.innerHTML=renderRules();
  // re-attach listeners
  if(currentTab==="picks") attachPickListeners();
  if(currentTab==="results") attachResultListeners();
}

// ── PICKS ──────────────────────────────────────────────────────────────────
function teamOptions(filterFn){
  return TEAMS.filter(filterFn).map(t=>
    `<option value="${t.name}">${FLAGS[t.name]||""} ${t.name} (${t.odds}/1)</option>`
  ).join("");
}

function renderPicks(){
  const picks=allPicks[currentPlayer]||{};
  const total=calcTotal(picks);
  let html=`
    <div style="margin-bottom:6px;font-weight:800;font-size:22px">${currentPlayer}'s Picks</div>
    <div class="mono" style="font-size:11px;color:#555;margin-bottom:28px">
      Total pts: <span style="color:#f59e0b">${total}</span>
    </div>`;

  const slotTeams={
    think:TEAMS,
    want:TEAMS,
    dark:TEAMS.filter(t=>t.odds>=50),
    hail:TEAMS.filter(t=>t.odds>=200)
  };

  for(const [slot,meta] of Object.entries(SLOT_META)){
    const chosen=picks[slot]||"";
    const chosenTeam=chosen?TEAMS.find(t=>t.name===chosen):null;
    const pts=chosenTeam?calcTeamPts(slot,chosen):null;
    const badge=slot==="dark"?`<span class="mono" style="margin-left:8px;font-size:10px;color:${meta.color}88">50/1+</span>`:
                slot==="hail"?`<span class="mono" style="margin-left:8px;font-size:10px;color:${meta.color}88">200/1+</span>`:"";
    const ptsHtml=pts!==null?`<span class="mono" style="font-size:16px;font-weight:700;color:${meta.color}">${pts} pts</span>`:"";

    const options=slotTeams[slot].map(t=>
      `<option value="${t.name}"${t.name===chosen?" selected":""}>${FLAGS[t.name]||""} ${t.name} (${t.odds}/1)</option>`
    ).join("");

    let chosenHtml="";
    if(chosenTeam){
      const wantNote=slot==="want"?`<div style="font-size:10px;color:#888;margin-top:2px">${chosenTeam.odds<=19?"2pts/win":chosenTeam.odds<=75?"3pts/win":"4pts/win"}</div>`:"";
      chosenHtml=`
        <div class="chosen-box" style="background:${meta.color}10;border:1px solid ${meta.color}22">
          <span style="font-size:22px">${FLAGS[chosenTeam.name]||"🏳️"}</span>
          <div>
            <div style="font-weight:700;font-size:14px">${chosenTeam.name}</div>
            <div class="mono" style="font-size:11px;color:${meta.color}">${chosenTeam.odds}/1 odds</div>
            ${wantNote}
          </div>
        </div>`;
    }

    html+=`
      <div class="card" style="border:1px solid ${meta.color}33">
        <div style="padding:14px 18px;background:${meta.color}12;border-bottom:1px solid ${meta.color}22;display:flex;align-items:center;justify-content:space-between">
          <span style="font-weight:800;font-size:14px;color:${meta.color}">${meta.emoji} ${meta.label}${badge}</span>
          ${ptsHtml}
        </div>
        <div style="padding:14px 18px">
          <div class="mono" style="font-size:11px;color:#555;margin-bottom:12px;line-height:1.5">${meta.desc}</div>
          <select class="sel pick-select" data-slot="${slot}">
            <option value="">— Select a team —</option>
            ${options}
          </select>
          ${chosenHtml}
        </div>
      </div>`;
  }
  return html;
}

function attachPickListeners(){
  document.querySelectorAll(".pick-select").forEach(sel=>{
    sel.addEventListener("change",e=>{
      if(e.target.value) setPick(e.target.dataset.slot, e.target.value);
    });
  });
}

// ── LEADERBOARD ────────────────────────────────────────────────────────────
function renderLeaderboard(){
  const board=PLAYERS.map(p=>({name:p,total:calcTotal(allPicks[p]||{})}))
    .sort((a,b)=>b.total-a.total);

  let html=`
    <div style="font-weight:800;font-size:22px;margin-bottom:6px">Leaderboard</div>
    <div class="mono" style="font-size:11px;color:#555;margin-bottom:28px">Updates as results are entered</div>`;

  board.forEach((p,i)=>{
    const col=i===0?"#f59e0b":i===1?"#6ee7b7":"#f0f0f0";
    const border=i===0?"#f59e0b55":i===1?"#6ee7b755":"#1a1a30";
    const prize=i===0?"wins $80":i===1?"wins $40":"";
    const medal=i===0?"🥇":i===1?"🥈":(i+1);
    const pickRow=Object.entries(SLOT_META).map(([slot,meta])=>{
      const pick=(allPicks[p.name]||{})[slot];
      const pts=pick?calcTeamPts(slot,pick):0;
      return `<span class="mono" style="font-size:10px;color:${meta.color}">${meta.emoji} ${pick?`${FLAGS[pick]||""}${pick} +${pts}`:"—"}</span>`;
    }).join("");

    html+=`
      <div style="margin-bottom:12px;background:#0d0d1c;border:1px solid ${border};border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px">
        <div style="width:36px;height:36px;border-radius:50%;flex-shrink:0;background:${col}22;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:${col}">${medal}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:18px;margin-bottom:6px">${p.name}</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">${pickRow}</div>
        </div>
        <div style="text-align:right">
          <div class="mono" style="font-weight:700;font-size:24px;color:${col}">${p.total}</div>
          <div class="mono" style="font-size:10px;color:${col}88">${prize}</div>
        </div>
      </div>`;
  });

  // Picks grid
  html+=`<div style="font-weight:800;font-size:16px;margin:28px 0 14px">All Picks</div>
    <div style="background:#0d0d1c;border:1px solid #1a1a30;border-radius:12px;overflow:hidden">
      <div style="display:grid;grid-template-columns:90px repeat(4,1fr);background:#0f0f22;padding:10px 16px;gap:8px">
        <div class="mono" style="font-size:10px;color:#444">PLAYER</div>
        ${Object.entries(SLOT_META).map(([s,m])=>`<div class="mono" style="font-size:10px;color:${m.color};text-align:center">${m.emoji}</div>`).join("")}
      </div>`;

  PLAYERS.forEach((p,i)=>{
    const cells=Object.entries(SLOT_META).map(([slot,meta])=>{
      const pick=(allPicks[p]||{})[slot];
      return `<div style="text-align:center;font-size:11px;font-family:'Courier New',monospace;color:${pick?meta.color:"#333"}">
        ${pick?`${FLAGS[pick]||""}<br><span style="font-size:9px">${pick.split(" ")[0]}</span>`:"—"}</div>`;
    }).join("");
    html+=`
      <div style="display:grid;grid-template-columns:90px repeat(4,1fr);padding:10px 16px;gap:8px;border-top:1px solid #1a1a30;background:${i%2===0?"#0d0d1c":"#0a0a18"}">
        <div style="font-weight:700;font-size:13px;align-self:center">${p}</div>
        ${cells}
      </div>`;
  });
  html+=`</div>`;
  return html;
}

// ── RESULTS ────────────────────────────────────────────────────────────────
function renderResults(){
  const savedHtml=Object.keys(results).length?`
    <div style="font-weight:800;font-size:16px;margin-bottom:14px">Saved Results</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px">
      ${Object.entries(results).map(([team,r])=>`
        <div style="background:#0d0d1c;border:1px solid #1a1a30;border-radius:8px;padding:14px">
          <div style="font-size:18px;margin-bottom:4px">${FLAGS[team]||""}</div>
          <div style="font-weight:700;font-size:13px;margin-bottom:4px">${team}</div>
          <div class="mono" style="font-size:10px;color:#8b5cf6;margin-bottom:2px">${STAGES[r.stage||0]}</div>
          <div class="mono" style="font-size:10px;color:#555">${r.groupWins||0}W ${r.groupGoals||0}g (grp) · ${r.koWins||0}W ${r.koGoals||0}g (ko)</div>
        </div>`).join("")}
    </div>`:""

  const firstTeam=TEAMS[0].name;
  const teamOpts=TEAMS.map(t=>`<option value="${t.name}">${FLAGS[t.name]||""} ${t.name} (${t.odds}/1)</option>`).join("");
  const stageOpts=STAGES.map((s,i)=>`
    <button class="stagepill stage-btn" data-stage="${i}"
      style="background:#1a1a2e;border:1px solid #2a2a4a;color:#555">${s}</button>`).join("");

  return `
    <div style="font-weight:800;font-size:22px;margin-bottom:6px">Enter Results</div>
    <div class="mono" style="font-size:11px;color:#555;margin-bottom:28px">Update as the tournament progresses</div>
    <div class="card" style="border:1px solid #1a1a30;padding:20px;margin-bottom:28px">
      <div style="margin-bottom:16px">
        <label class="label">Team</label>
        <select class="sel" id="res-team">${teamOpts}</select>
      </div>
      <div class="grid2" style="margin-bottom:16px">
        <div><label class="label">Group Wins</label><input type="number" min="0" class="numbox" id="res-gw" value="0"/></div>
        <div><label class="label">Group Goals</label><input type="number" min="0" class="numbox" id="res-gg" value="0"/></div>
        <div><label class="label">KO Wins</label><input type="number" min="0" class="numbox" id="res-kw" value="0"/></div>
        <div><label class="label">KO Goals</label><input type="number" min="0" class="numbox" id="res-kg" value="0"/></div>
      </div>
      <div style="margin-bottom:16px">
        <label class="label">Stage Reached</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px" id="stage-pills">${stageOpts}</div>
      </div>
      <button class="btn" id="save-result-btn" style="background:#f59e0b;color:#080810;width:100%;padding:12px 0;font-size:13px">Save Result</button>
    </div>
    ${savedHtml}`;
}

let currentStage=0;
function attachResultListeners(){
  currentStage=0;
  updateStagePills();

  document.getElementById("res-team").addEventListener("change",e=>{
    const r=results[e.target.value]||{};
    document.getElementById("res-gw").value=r.groupWins||0;
    document.getElementById("res-gg").value=r.groupGoals||0;
    document.getElementById("res-kw").value=r.koWins||0;
    document.getElementById("res-kg").value=r.koGoals||0;
    currentStage=r.stage||0;
    updateStagePills();
  });

  document.querySelectorAll(".stage-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      currentStage=parseInt(btn.dataset.stage);
      updateStagePills();
    });
  });

  document.getElementById("save-result-btn").addEventListener("click",()=>{
    const team=document.getElementById("res-team").value;
    saveResult(team,{
      groupWins:parseInt(document.getElementById("res-gw").value)||0,
      groupGoals:parseInt(document.getElementById("res-gg").value)||0,
      koWins:parseInt(document.getElementById("res-kw").value)||0,
      koGoals:parseInt(document.getElementById("res-kg").value)||0,
      stage:currentStage
    });
  });
}

function updateStagePills(){
  document.querySelectorAll(".stage-btn").forEach(btn=>{
    const i=parseInt(btn.dataset.stage);
    btn.style.background=i===currentStage?"#8b5cf622":"#1a1a2e";
    btn.style.border=i===currentStage?"1px solid #8b5cf6":"1px solid #2a2a4a";
    btn.style.color=i===currentStage?"#8b5cf6":"#555";
  });
}

// ── RULES ──────────────────────────────────────────────────────────────────
function renderRules(){
  const sections=[
    {slot:"think",rows:[["Win (any round)","2 pts"],["Goal scored","0.25 pts"],["Odds restriction","None — any team"]]},
    {slot:"want", rows:[["Win — odds ≤19/1","2 pts"],["Win — 20/1 to 75/1","3 pts"],["Win — 76/1 to 500/1","4 pts"],["Goals","0.25 / 0.5 / 0.75 pts"],["Odds restriction","None — any team"]]},
    {slot:"dark", rows:[["Win","5 pts"],["Goal scored","1 pt"],["Reach knockouts","ALL points ×2"],["Odds restriction","Must be 50/1 or longer"]]},
    {slot:"hail", rows:[["Win","6 pts"],["Goal scored","1.5 pts"],["Multiplier","×3 on everything always"],["Odds restriction","Must be 200/1 or longer"]]},
  ];

  let html=`
    <div style="font-weight:800;font-size:22px;margin-bottom:6px">How It Works</div>
    <div class="mono" style="font-size:11px;color:#555;margin-bottom:28px">4 picks. $20 each. $80 to 1st · $40 to 2nd.</div>`;

  sections.forEach(({slot,rows})=>{
    const m=SLOT_META[slot];
    html+=`
      <div class="card" style="border:1px solid ${m.color}33;margin-bottom:14px">
        <div style="padding:12px 18px;background:${m.color}12;border-bottom:1px solid ${m.color}22">
          <span style="font-weight:800;font-size:14px;color:${m.color}">${m.emoji} ${m.label}</span>
        </div>
        ${rows.map(([k,v])=>`
          <div class="row-sep" style="display:flex;justify-content:space-between;padding:9px 18px">
            <span class="mono" style="font-size:12px;color:#888">${k}</span>
            <span class="mono" style="font-size:12px;color:${m.color}">${v}</span>
          </div>`).join("")}
      </div>`;
  });

  html+=`
    <div class="card" style="border:1px solid #10b98133">
      <div style="padding:12px 18px;background:#10b98112;border-bottom:1px solid #10b98122">
        <span style="font-weight:800;font-size:14px;color:#10b981">📈 Stage Progression Bonus</span>
      </div>
      ${[["Round of 32","+2 pts"],["Round of 16","+4 pts"],["Quarter-Final","+7 pts"],["Semi-Final","+12 pts"],["Runner-Up","+18 pts"],["Champion","+25 pts"]].map(([k,v])=>`
        <div class="row-sep" style="display:flex;justify-content:space-between;padding:9px 18px">
          <span class="mono" style="font-size:12px;color:#888">${k}</span>
          <span class="mono" style="font-size:12px;color:#10b981">${v}</span>
        </div>`).join("")}
      <div style="padding:10px 18px;font-size:10px;color:#555;font-family:'Courier New',monospace">
        Dark Horse doubles all bonuses once they hit knockouts. Hail Mary triples everything throughout.
      </div>
    </div>`;

  return html;
}

window.addEventListener("load",()=>{
  // Use localStorage only (no Firebase config needed)
  loadLocal();
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="block";
  render();
});

// expose for inline handlers
window.selectPlayer=selectPlayer;
window.showTab=showTab;
